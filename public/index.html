<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WarenVault</title>
    <style>
        body { background: #020408; color: #c8e8f5; font-family: monospace; padding: 40px; }
        h1 { color: #00d4ff; font-size: 24px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: #071520; padding: 20px; border: 1px solid #0e3a58; border-radius: 4px; }
        .label { font-size: 12px; color: #4a7a9b; margin-bottom: 10px; }
        .val { font-size: 24px; color: #00d4ff; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; border-bottom: 2px solid #00d4ff; padding: 12px; color: #00d4ff; font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid #0e3a58; font-size: 14px; }
        .neg { color: #ff3d5a; }
        .pos { color: #00ff88; }
    </style>
</head>
<body>
    <h1>WARENVAULT_v1.0</h1>
    <div class="grid">
        <div class="card"><div class="label">FILES</div><div id="total-files" class="val">0</div></div>
        <div class="card"><div class="label">SAVED</div><div id="saved" class="val">0 KB</div></div>
        <div class="card"><div class="label">COMPRESSION</div><div id="avg-comp" class="val">0%</div></div>
    </div>
    <table>
        <thead><tr><th>FILE_ID</th><th>ORIGINAL (B)</th><th>OPTIMIZED (B)</th><th>RATIO</th></tr></thead>
        <tbody id="file-list"></tbody>
    </table>
    <script>
        async function updateUI() {
            try {
                const s = await fetch('/stats').then(r => r.json());
                document.getElementById('total-files').innerText = s.totalFiles;
                document.getElementById('saved').innerText = s.totalStorageSaved;
                document.getElementById('avg-comp').innerText = s.averageCompression + '%';

                const files = await fetch('/list').then(r => r.json());
                document.getElementById('file-list').innerHTML = files.map(f => {
                    const ratio = parseFloat(f.compressionRatio);
                    const ratioClass = ratio < 0 ? 'neg' : 'pos';
                    return `
                        <tr>
                            <td>${f.id.slice(0,8)}</td>
                            <td>${f.originalSize}</td>
                            <td>${f.optimizedSize || f.processedSize || 'N/A'}</td>
                            <td class="${ratioClass}">${ratio}%</td>
                        </tr>
                    `;
                }).join('');
            } catch (e) { console.log("Vault Offline"); }
        }
        updateUI(); setInterval(updateUI, 5000);
    </script>
</body>
</html>
